services:
  webstalker:
    build: .
    image: webstalker:local
    container_name: webstalker
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      - ./data:/data
    environment:
      WEBSTALKER_DATA_DIR: /data
      WEBSTALKER_BIND_HOST: 0.0.0.0
      WEBSTALKER_BIND_PORT: "8000"
    restart: unless-stopped
