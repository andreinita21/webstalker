<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="color-scheme" content="light dark">
  <title>{% block title %}WebStalker{% endblock %}</title>
  <link rel="stylesheet" href="/static/style.css">
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'%3E%3Crect width='16' height='16' rx='3' fill='%231f2328'/%3E%3Ccircle cx='8' cy='8' r='3' fill='%23fff'/%3E%3C/svg%3E">
</head>
<body>
  <header class="topbar">
    <div class="container topbar-inner">
      <a class="brand" href="/">
        <span class="brand-mark">W</span>
        <span class="brand-name">WebStalker</span>
      </a>
      <nav class="topnav" aria-label="Primary">
        <span class="local-pill" title="Bound to 127.0.0.1">Local</span>
        <a class="nav-link" href="/" {% if request.url.path == '/' %}aria-current="page"{% endif %}>Dashboard</a>
        <a class="btn btn-primary" href="/websites/new">Add website</a>
      </nav>
    </div>
  </header>

  {% if flash %}
  <div class="container">
    <div class="flash flash-{{ flash.kind }}" role="status" data-autodismiss="5000">{{ flash.message }}</div>
  </div>
  {% endif %}

  <main class="container">
    {% block content %}{% endblock %}
  </main>

  <footer class="footer">
    <div class="container">
      <span>WebStalker, local-only. Data lives in your <code class="mono">data/</code> directory.</span>
      <span class="subtle">v0.1</span>
    </div>
  </footer>

  <script src="/static/app.js" defer></script>
</body>
</html>
